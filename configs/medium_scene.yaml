# Cloud-GPU setup: 400x400, half # of guassians and half schedule.
# Smaller resolution and population than paper.yaml but still a long enough run (~5 hours on RTX 4090)

# data
data_dir: data/lego
downscale: 2                  # 400x400

# model
N_gaussians: 50_000

# training
position_lr_init: 0.00016
position_lr_final: 0.0000016
position_lr_delay_mult: 0.01
position_lr_max_steps: 15_000
feature_lr: 0.0025
opacity_lr: 0.025
scaling_lr: 0.005
rotation_lr: 0.001
lambda_dssim: 0.2
sh_schedule_interval: 500

# densification
densification_interval: 50
densify_from_iter: 250
densify_until_iter: 7_500
densify_grad_threshold: 0.0002
percent_dense: 0.01
opacity_threshold: 0.005
opacity_reset_interval: 1500
opacity_reset_value: 0.01

# evaluation
eval_interval: 1000
eval_max_frames: 10

# logging
log_dir: runs/lego_medium
